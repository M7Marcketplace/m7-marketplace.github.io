<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - M7 Marketplace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="M7shooping.css">
    <link rel="icon" type="image/x-icon" href="M7shooping.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo">
        <img src="M7shooping.png" alt="M7 Shopping Logo" class="logo-img">
        <span class="logo-text">M7 Marketplace</span>
    </div>
    <nav>
        <ul>
            <li><a href="home.html">🏠 Home</a></li>
            <li><a href="products.html">🛍️ Products</a></li>
            <li><a href="cart.html">🛒 Cart</a></li>
            <li><a href="about.html">📖 About</a></li>
            <li><a href="contact.html" class="active">📞 Contact</a></li>
            <li><a href="auth.html">👤 Account</a></li>
        </ul>
    </nav>
</header>

<main>
    <div id="checkout-container">
        <!-- Checkout will be loaded by JavaScript -->
        <div class="loading-state" style="text-align: center; padding: 80px;">
            <div class="spinner" style="width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #d96565; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <h2>Loading Checkout</h2>
            <p style="opacity: 0.7;">Please wait while we prepare your checkout...</p>
        </div>
    </div>
</main>

<footer>
    <p>© 2026 M7 Marketplace. All rights reserved. | <a href="about.html">About</a> | <a href="contact.html">Contact</a></p>
</footer>

<script src="script.js"></script>
<script>
    // Force checkout to load
    document.addEventListener('DOMContentLoaded', function() {
        console.log('🔍 Checkout page loaded');
        
        // Update navbar
        if (typeof updateNavbarForUser === 'function') {
            updateNavbarForUser();
        }
        
        // Call checkout function
        if (typeof loadCheckoutPage === 'function') {
            console.log('✅ Calling loadCheckoutPage');
            loadCheckoutPage();
        } else {
            console.error('❌ loadCheckoutPage function not found!');
            // Fallback
            document.getElementById('checkout-container').innerHTML = `
                <div class="error-state" style="text-align: center; padding: 60px;">
                    <div style="font-size: 80px; margin-bottom: 20px;">⚠️</div>
                    <h2>Error Loading Checkout</h2>
                    <p>Please try again or contact support.</p>
                    <a href="cart.html" class="btn">Back to Cart</a>
                </div>
            `;
        }
    });
</script>
<script src="script.js"></script>
<!-- Add these at the bottom of each page, just before </body> -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="script.js"></script>
</body>
</html>
