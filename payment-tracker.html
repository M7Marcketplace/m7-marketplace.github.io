<!DOCTYPE html>
<html>
<head>
    <title>Payment Tracker - M7 Admin</title>
    <link rel="stylesheet" href="M7shooping.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #d96565; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #444; }
        .paid { color: #4CAF50; }
        .pending { color: #FF9800; }
        .btn-small { padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div style="padding: 20px; max-width: 1200px; margin: 0 auto;">
        <h1>💰 Payment Tracker - M7 Marketplace</h1>
        
        <div id="payments-container">
            <!-- Payments will load here -->
        </div>
        
        <button onclick="generateReport()" class="btn" style="margin-top: 20px;">📥 Download Report</button>
    </div>

    <script>
        function loadPayments() {
            let users = JSON.parse(localStorage.getItem('users')) || [];
            let sellers = users.filter(u => u.role === 'seller');
            let html = '<table><tr><th>Seller</th><th>Store</th><th>Revenue</th><th>Commission</th><th>Status</th><th>Action</th></tr>';
            
            sellers.forEach(seller => {
                let products = JSON.parse(localStorage.getItem('sellerProducts_' + seller.id)) || [];
                let revenue = products.reduce((sum, p) => sum + ((p.sold || 0) * p.price), 0);
                let commission = Math.round(revenue * 0.1);
                let paidStatus = localStorage.getItem('paid_' + seller.id) || 'pending';
                
                html += `
                    <tr>
                        <td>${seller.fullName}</td>
                        <td>${seller.store?.name || 'N/A'}</td>
                        <td>${revenue.toLocaleString()} DZD</td>
                        <td>${commission.toLocaleString()} DZD</td>
                        <td class="${paidStatus}">${paidStatus === 'paid' ? '✅ Paid' : '⏳ Pending'}</td>
                        <td>
                            ${paidStatus === 'pending' ? 
                                `<button onclick="markAsPaid('${seller.id}')" class="btn btn-small">✓ Mark Paid</button>` : 
                                '✓ Paid'}
                        </td>
                    </tr>
                `;
            });
            
            html += '</table>';
            document.getElementById('payments-container').innerHTML = html;
        }
        
        function markAsPaid(sellerId) {
            localStorage.setItem('paid_' + sellerId, 'paid');
            loadPayments();
            alert('✅ Marked as paid!');
        }
        
        function generateReport() {
            let users = JSON.parse(localStorage.getItem('users')) || [];
            let sellers = users.filter(u => u.role === 'seller');
            let report = "M7 MARKETPLACE - PAYMENT REPORT\n";
            report += "================================\n\n";
            report += `Date: ${new Date().toLocaleString()}\n\n`;
            
            let totalCommission = 0;
            
            sellers.forEach(seller => {
                let products = JSON.parse(localStorage.getItem('sellerProducts_' + seller.id)) || [];
                let revenue = products.reduce((sum, p) => sum + ((p.sold || 0) * p.price), 0);
                let commission = Math.round(revenue * 0.1);
                totalCommission += commission;
                let status = localStorage.getItem('paid_' + seller.id) || 'pending';
                
                report += `Seller: ${seller.fullName} (${seller.store?.name || 'No store'})\n`;
                report += `Revenue: ${revenue.toLocaleString()} DZD\n`;
                report += `Commission: ${commission.toLocaleString()} DZD\n`;
                report += `Status: ${status}\n`;
                report += `Reference: M7-${seller.id}\n`;
                report += "─".repeat(40) + "\n\n";
            });
            
            report += `TOTAL COMMISSION: ${totalCommission.toLocaleString()} DZD\n`;
            
            let blob = new Blob([report], { type: 'text/plain' });
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'payment_report_' + Date.now() + '.txt';
            a.click();
        }
        
        loadPayments();
    </script>
