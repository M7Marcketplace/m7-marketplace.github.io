            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: rgba(255,255,255,0.1);
            padding: 20px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        
        .admin-header h1 {
            margin: 0;
            background: linear-gradient(135deg, #d96565, #4CAF50);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .admin-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 12px 25px;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .tab-btn:hover {
            background: rgba(217, 101, 101, 0.3);
            transform: translateY(-2px);
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #d96565, #b84343);
            border-color: transparent;
        }
        
        .admin-section {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: #d96565;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        
        th {
            background: rgba(217, 101, 101, 0.3);
            padding: 15px;
            text-align: left;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        tr:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .action-btn {
            padding: 8px 15px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 0 5px;
        }
        
        .edit-btn { background: #4CAF50; color: white; }
        .delete-btn { background: #d96565; color: white; }
        .suspend-btn { background: #FF9800; color: white; }
        .view-btn { background: #2196F3; color: white; }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

            flex: 1;
            padding: 15px 20px;
            border-radius: 50px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;

            padding: 15px 25px;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

            background: #4CAF50;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-right: 15px;

            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;

    function filterTable() {
        let search = document.getElementById('searchInput').value.toLowerCase();
        let roleFilter = document.getElementById('roleFilter').value;
        let statusFilter = document.getElementById('statusFilter').value;
        
        let rows = document.querySelectorAll('tbody tr');
        
        rows.forEach(row => {
            let name = row.dataset.name?.toLowerCase() || '';
            let email = row.dataset.email?.toLowerCase() || '';
            let username = row.dataset.username?.toLowerCase() || '';
            let role = row.dataset.role;
            let matchesSearch = name.includes(search) || email.includes(search) || username.includes(search);
            let matchesRole = roleFilter === 'all' || role === roleFilter;
            
            row.style.display = matchesSearch && matchesRole ? '' : 'none';
        });
    }
    
    function exportData(format) {
        let data;
        switch(currentTab) {
            case 'users': data = allUsers; break;
            case 'sellers': data = allUsers.filter(u => u.role === 'seller'); break;
            case 'products': data = allProducts; break;
            case 'orders': data = allOrders; break;
            case 'deleted': data = deletedAccounts; break;
            default: data = allUsers;
        }
        
        let content = format === 'json' ? JSON.stringify(data, null, 2) : convertToCSV(data);
        let blob = new Blob([content], { type: format === 'json' ? 'application/json' : 'text/csv' });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        a.download = `${currentTab}_${Date.now()}.${format}`;
        a.click();
    }
    
    function convertToCSV(data) {
        if (data.length === 0) return '';
        let headers = Object.keys(data[0]);
        let csv = headers.join(',') + '\n';
        data.forEach(row => {
            csv += headers.map(h => JSON.stringify(row[h] || '')).join(',') + '\n';
        });
        return csv;
    }

    // ==================== PAYMENT TRACKING SYSTEM ====================

    // Track payments made by sellers
    function markPaymentReceived(sellerId) {
        let paymentDate = new Date().toLocaleDateString();
        let paymentRecord = {
            sellerId: sellerId,
            date: paymentDate,
            amount: calculateSellerCommission(sellerId),
            status: 'paid',
            reference: prompt('Enter payment reference (optional):', 'CCP Transfer')
        };
        
        // Save to localStorage
        let payments = JSON.parse(localStorage.getItem('seller_payments')) || [];
        payments.push(paymentRecord);
        localStorage.setItem('seller_payments', JSON.stringify(payments));
        
        // Mark as paid in current session
        localStorage.setItem('paid_' + sellerId, 'paid');
        localStorage.setItem('paid_date_' + sellerId, paymentDate);
        
        showNotification('✅ Payment marked as received!', 'success');
        loadTab('sellers'); // Refresh the sellers tab
    }

    // Calculate commission for a seller
    function calculateSellerCommission(sellerId) {
        let sellerProducts = allProducts.filter(p => p.sellerId == sellerId);
        let totalRevenue = sellerProducts.reduce((sum, p) => sum + ((p.sold || 0) * p.price), 0);
        return Math.round(totalRevenue * 0.1); // 10% commission
    }

    // Check if seller has paid
    function hasSellerPaid(sellerId) {
        let paid = localStorage.getItem('paid_' + sellerId);
        return paid === 'paid';
    }

    // Get last payment date
    function getLastPaymentDate(sellerId) {
        return localStorage.getItem('paid_date_' + sellerId) || 'Never';
    }

    // Get payment history for a seller
    function getSellerPaymentHistory(sellerId) {
        let payments = JSON.parse(localStorage.getItem('seller_payments')) || [];
        return payments.filter(p => p.sellerId == sellerId);
    }

    // Calculate total unpaid commissions
    function calculateTotalUnpaid() {
        let sellers = allUsers.filter(u => u.role === 'seller');
        let total = 0;
        
        sellers.forEach(seller => {
            if (!hasSellerPaid(seller.id)) {
                total += calculateSellerCommission(seller.id);
            }
        });
        
        return total;
    }

                        <div class="payment-row">
                            <span>${p.date}</span>
                            <span>${p.amount.toLocaleString()} DZD</span>
                            <span class="payment-status payment-paid">Paid</span>
                            <span>${p.reference || ''}</span>
                        </div>
                    `).join('')}
                </div>
                ` : ''}
                
                <div style="display: flex; gap: 10px; margin-top: 30px;">
                    ${!hasPaid ? `
                        <button onclick="markPaymentReceived('${sellerId}'); this.closest('.modal').remove();" class="action-btn edit-btn" style="flex: 1;">
                            ✅ Mark as Paid
                        </button>
                    ` : ''}
                    <button onclick="this.closest('.modal').remove()" class="action-btn" style="flex: 1; background: #666;">Close</button>
                </div>
            </div>
        `;
        
        document.body.appendChild(modal);
    }

    // Update the sellers display to include payment status
    function displaySellers(container) {
        let sellers = allUsers.filter(u => u.role === 'seller');
        let totalUnpaid = calculateTotalUnpaid();
        
        let html = '<h2>🛒 All Sellers</h2>';
        
        // Payment summary
        html += `
            <div style="background: rgba(255,152,0,0.1); padding: 20px; border-radius: 15px; margin-bottom: 30px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h3 style="color: #FF9800; margin: 0;">💰 Pending Payments</h3>
                        <p style="margin: 5px 0 0;">Total unpaid commissions</p>
                    </div>
                    <div style="font-size: 32px; font-weight: bold; color: #FF9800;">${totalUnpaid.toLocaleString()} DZD</div>
                </div>
            </div>
        `;
        
        html += '<table><thead><tr><th>Store</th><th>Owner</th><th>Products</th><th>Revenue</th><th>Commission</th><th>Payment Status</th><th>Actions</th></tr></thead><tbody>';
        
        sellers.forEach(seller => {
            let products = allProducts.filter(p => p.sellerId === seller.id) || [];
            let totalRevenue = products.reduce((sum, p) => sum + ((p.sold || 0) * p.price), 0);
            let commission = Math.round(totalRevenue * 0.1);
            let hasPaid = hasSellerPaid(seller.id);
            let paymentStatus = hasPaid ? 'payment-paid' : 'payment-pending';
            let statusText = hasPaid ? '✅ Paid' : '⏳ Pending';
            
            html += `
                <tr>
                    <td><strong>${seller.store?.name || 'No store'}</strong></td>
                    <td>${seller.fullName}</td>
                    <td>${products.length}</td>
                    <td>${totalRevenue.toLocaleString()} DZD</td>
                    <td><strong>${commission.toLocaleString()} DZD</strong></td>
                    <td><span class="payment-status ${paymentStatus}">${statusText}</span></td>
                    <td>
                        <button class="action-btn view-btn" onclick="viewSeller('${seller.id}')">👤 View</button>
                        <button class="action-btn edit-btn" onclick="showPaymentDetails('${seller.id}')">💰 Payment</button>
                        ${!hasPaid ? 
                            `<button class="action-btn suspend-btn" onclick="markPaymentReceived('${seller.id}')">✅ Mark Paid</button>` : 
                            ''}
                    </td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        container.innerHTML = html;
    }

</script>

</body>
</html>
