<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - M7 Marketplace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="M7shooping.css">
    <link rel="icon" type="image/x-icon" href="M7shooping.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: white;
            font-family: 'Poppins', sans-serif;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: rgba(255,255,255,0.1);
            padding: 20px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        
        .admin-header h1 {
            margin: 0;
            background: linear-gradient(135deg, #d96565, #4CAF50);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .admin-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 12px 25px;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .tab-btn:hover {
            background: rgba(217, 101, 101, 0.3);
            transform: translateY(-2px);
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #d96565, #b84343);
            border-color: transparent;
        }
        
        .admin-section {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: #d96565;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        
        th {
            background: rgba(217, 101, 101, 0.3);
            padding: 15px;
            text-align: left;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        tr:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .action-btn {
            padding: 8px 15px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 0 5px;
        }
        
        .edit-btn { background: #4CAF50; color: white; }
        .delete-btn { background: #d96565; color: white; }
        .suspend-btn { background: #FF9800; color: white; }
        .view-btn { background: #2196F3; color: white; }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .search-bar input {
            flex: 1;
            padding: 15px 20px;
            border-radius: 50px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
        }
        
        .search-bar input:focus {
            outline: 2px solid #d96565;
        }
        
        .filter-select {
            padding: 15px 25px;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .export-btn {
            background: #4CAF50;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-right: 15px;
        }
        
        .danger-btn {
            background: #d96565;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 30px;
            max-width: 500px;
            width: 90%;
        }
        
        .badge {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-active { background: rgba(76, 175, 80, 0.2); color: #4CAF50; border: 1px solid #4CAF50; }
        .badge-suspended { background: rgba(255, 152, 0, 0.2); color: #FF9800; border: 1px solid #FF9800; }
        .badge-deleted { background: rgba(217, 101, 101, 0.2); color: #d96565; border: 1px solid #d96565; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-header">
        <h1>🔐 M7 Marketplace Admin Panel</h1>
        <div>
            <span style="margin-right: 20px;">Welcome, Admin</span>
            <button onclick="logoutAdmin()" class="action-btn" style="background: #666;">Logout</button>
        </div>
    </div>
    
    <!-- Quick Stats -->
    <div class="stats-grid" id="stats-container">
        <!-- Filled by JavaScript -->
    </div>
    
    <!-- Tabs -->
    <div class="admin-tabs">
        <button class="tab-btn active" onclick="switchTab('users')">👥 Users</button>
        <button class="tab-btn" onclick="switchTab('sellers')">🛒 Sellers</button>
        <button class="tab-btn" onclick="switchTab('products')">📦 Products</button>
        <button class="tab-btn" onclick="switchTab('orders')">📋 Orders</button>
        <button class="tab-btn" onclick="switchTab('deleted')">🗑️ Deleted Accounts</button>
    </div>
    
    <!-- Search & Filters -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Search by name, email, or username..." onkeyup="filterTable()">
        <select class="filter-select" id="roleFilter" onchange="filterTable()">
            <option value="all">All Roles</option>
            <option value="buyer">Buyers</option>
            <option value="seller">Sellers</option>
        </select>
        <select class="filter-select" id="statusFilter" onchange="filterTable()">
            <option value="all">All Status</option>
            <option value="active">Active</option>
            <option value="suspended">Suspended</option>
        </select>
    </div>
    
    <!-- Export Buttons -->
    <div style="margin-bottom: 20px; text-align: right;">
        <button onclick="exportData('csv')" class="export-btn">📥 Export to CSV</button>
        <button onclick="exportData('json')" class="export-btn">📥 Export to JSON</button>
        <button onclick="showBackupModal()" class="danger-btn">💾 Backup Data</button>
    </div>
    
    <!-- Main Content Area -->
    <div class="admin-section" id="admin-content">
        <!-- Content loaded by JavaScript -->
        <div style="text-align: center; padding: 50px;">
            <div class="loading-spinner"></div>
            <p>Loading admin panel...</p>
        </div>
    </div>
</div>

<script>
    // ==================== ADMIN AUTHENTICATION ====================
    // Simple password protection (you can change this)
    const ADMIN_PASSWORD = "M7Admin2026"; // Change this to your secret password
    
    // Check if admin is logged in
    if (!sessionStorage.getItem('adminLoggedIn')) {
        let password = prompt("🔐 Enter Admin Password:");
        if (password !== ADMIN_PASSWORD) {
            alert("❌ Access denied!");
            window.location.href = 'home.html';
        } else {
            sessionStorage.setItem('adminLoggedIn', 'true');
        }
    }
    
    // ==================== GLOBAL VARIABLES ====================
    let currentTab = 'users';
    let allUsers = [];
    let allProducts = [];
    let allOrders = [];
    let deletedAccounts = [];
    
    // ==================== INITIALIZATION ====================
    document.addEventListener('DOMContentLoaded', function() {
        loadData();
    });
    
    function loadData() {
        // Load all data from localStorage
        allUsers = JSON.parse(localStorage.getItem('users')) || [];
        allProducts = JSON.parse(localStorage.getItem('allProducts')) || [];
        allOrders = JSON.parse(localStorage.getItem('orders')) || [];
        deletedAccounts = JSON.parse(localStorage.getItem('deleted_accounts')) || [];
        
        updateStats();
        loadTab(currentTab);
    }
    
    function updateStats() {
        let totalUsers = allUsers.length;
        let totalSellers = allUsers.filter(u => u.role === 'seller').length;
        let totalBuyers = allUsers.filter(u => u.role === 'buyer').length;
        let totalProducts = allProducts.length;
        let totalOrders = allOrders.length;
        let totalRevenue = allOrders.reduce((sum, o) => sum + (o.total || 0), 0);
        
        document.getElementById('stats-container').innerHTML = `
            <div class="stat-card"><div class="stat-number">${totalUsers}</div><div>Total Users</div></div>
            <div class="stat-card"><div class="stat-number">${totalSellers}</div><div>Sellers</div></div>
            <div class="stat-card"><div class="stat-number">${totalBuyers}</div><div>Buyers</div></div>
            <div class="stat-card"><div class="stat-number">${totalProducts}</div><div>Products</div></div>
            <div class="stat-card"><div class="stat-number">${totalOrders}</div><div>Orders</div></div>
            <div class="stat-card"><div class="stat-number">${totalRevenue.toLocaleString()} DZD</div><div>Revenue</div></div>
            <div class="stat-card"><div class="stat-number">${deletedAccounts.length}</div><div>Deleted</div></div>
        `;
    }
    
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        loadTab(tab);
    }
    
    function loadTab(tab) {
        let content = document.getElementById('admin-content');
        
        switch(tab) {
            case 'users':
                displayUsers(content);
                break;
            case 'sellers':
                displaySellers(content);
                break;
            case 'products':
                displayProducts(content);
                break;
            case 'orders':
                displayOrders(content);
                break;
            case 'deleted':
                displayDeleted(content);
                break;
        }
    }
    
    function displayUsers(container) {
        let html = '<h2>👥 All Users</h2>';
        html += '<table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Username</th><th>Role</th><th>Joined</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
        
        allUsers.forEach(user => {
            let status = user.suspended ? 'suspended' : 'active';
            let statusClass = user.suspended ? 'badge-suspended' : 'badge-active';
            
            html += `
                <tr data-email="${user.email}" data-name="${user.fullName}" data-username="${user.username}" data-role="${user.role}">
                    <td>${user.id}</td>
                    <td>${user.fullName}</td>
                    <td>${user.email}</td>
                    <td>${user.username}</td>
                    <td><span class="badge" style="background: ${user.role === 'seller' ? 'rgba(76,175,80,0.2)' : 'rgba(33,150,243,0.2)'}; color: ${user.role === 'seller' ? '#4CAF50' : '#2196F3'}">${user.role}</span></td>
                    <td>${user.registrationDate || 'N/A'}</td>
                    <td><span class="badge ${statusClass}">${status}</span></td>
                    <td>
                        <button class="action-btn view-btn" onclick="viewUser('${user.id}')">👁️ View</button>
                        ${!user.suspended ? 
                            `<button class="action-btn suspend-btn" onclick="toggleSuspendUser('${user.id}')">⏸️ Suspend</button>` : 
                            `<button class="action-btn edit-btn" onclick="toggleSuspendUser('${user.id}')">▶️ Activate</button>`}
                        <button class="action-btn delete-btn" onclick="adminDeleteUser('${user.id}')">🗑️ Delete</button>
                    </td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    function displaySellers(container) {
        let sellers = allUsers.filter(u => u.role === 'seller');
        
        let html = '<h2>🛒 All Sellers</h2>';
        html += '<table><thead><tr><th>Store</th><th>Owner</th><th>Email</th><th>Products</th><th>Revenue</th><th>Commission</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
        
        sellers.forEach(seller => {
            let products = allProducts.filter(p => p.sellerId === seller.id) || [];
            let totalRevenue = products.reduce((sum, p) => sum + ((p.sold || 0) * p.price), 0);
            let commission = Math.round(totalRevenue * 0.1);
            
            html += `
                <tr>
                    <td><strong>${seller.store?.name || 'No store'}</strong></td>
                    <td>${seller.fullName}</td>
                    <td>${seller.email}</td>
                    <td>${products.length}</td>
                    <td>${totalRevenue.toLocaleString()} DZD</td>
                    <td>${commission.toLocaleString()} DZD</td>
                    <td><span class="badge ${seller.suspended ? 'badge-suspended' : 'badge-active'}">${seller.suspended ? 'Suspended' : 'Active'}</span></td>
                    <td>
                        <button class="action-btn view-btn" onclick="viewSeller('${seller.id}')">📊 Dashboard</button>
                        <button class="action-btn edit-btn" onclick="markCommissionPaid('${seller.id}')">💰 Mark Paid</button>
                    </td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    function displayProducts(container) {
        let html = '<h2>📦 All Products</h2>';
        html += '<table><thead><tr><th>Product</th><th>Seller</th><th>Price</th><th>Stock</th><th>Sold</th><th>Category</th><th>Actions</th></tr></thead><tbody>';
        
        allProducts.forEach(product => {
            let seller = allUsers.find(u => u.id === product.sellerId);
            
            html += `
                <tr>
                    <td>${product.name}</td>
                    <td>${seller?.fullName || 'Unknown'}</td>
                    <td>${product.price.toLocaleString()} DZD</td>
                    <td>${product.quantity}</td>
                    <td>${product.sold || 0}</td>
                    <td>${product.category}</td>
                    <td>
                        <button class="action-btn view-btn" onclick="viewProduct('${product.id}')">👁️ View</button>
                        <button class="action-btn delete-btn" onclick="adminDeleteProduct('${product.id}')">🗑️ Delete</button>
                    </td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    function displayOrders(container) {
        let html = '<h2>📋 All Orders</h2>';
        html += '<table><thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>';
        
        allOrders.forEach(order => {
            html += `
                <tr>
                    <td>${order.id}</td>
                    <td>${order.customer?.name || 'N/A'}</td>
                    <td>${order.total?.toLocaleString()} DZD</td>
                    <td><span class="badge" style="background: rgba(255,193,7,0.2); color: #ffc107;">${order.status || 'pending'}</span></td>
                    <td>${order.date}</td>
                    <td>
                        <button class="action-btn view-btn" onclick="viewOrder('${order.id}')">👁️ View</button>
                    </td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    function displayDeleted(container) {
        let html = '<h2>🗑️ Deleted Accounts</h2>';
        
        if (deletedAccounts.length === 0) {
            html += '<p style="text-align: center; padding: 50px;">No deleted accounts found.</p>';
        } else {
            html += '<table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Deleted Date</th><th>Reason</th></tr></thead><tbody>';
            
            deletedAccounts.forEach(account => {
                html += `
                    <tr>
                        <td>${account.fullName}</td>
                        <td>${account.email}</td>
                        <td>${account.role}</td>
                        <td>${account.deletedDate}</td>
                        <td>${account.reason || 'User request'}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
        }
        
        container.innerHTML = html;
    }
    
    // ==================== ADMIN ACTIONS ====================
    function toggleSuspendUser(userId) {
        if (confirm('Toggle suspension for this user?')) {
            let user = allUsers.find(u => u.id == userId);
            if (user) {
                user.suspended = !user.suspended;
                localStorage.setItem('users', JSON.stringify(allUsers));
                showNotification(`User ${user.suspended ? 'suspended' : 'activated'}`, 'success');
                loadTab(currentTab);
            }
        }
    }
    
    function adminDeleteUser(userId) {
        if (confirm('⚠️ PERMANENTLY DELETE this user? This cannot be undone!')) {
            allUsers = allUsers.filter(u => u.id != userId);
            localStorage.setItem('users', JSON.stringify(allUsers));
            localStorage.removeItem('sellerProducts_' + userId);
            showNotification('User deleted', 'success');
            loadTab(currentTab);
            updateStats();
        }
    }
    
    function adminDeleteProduct(productId) {
        if (confirm('Delete this product?')) {
            allProducts = allProducts.filter(p => p.id != productId);
            localStorage.setItem('allProducts', JSON.stringify(allProducts));
            showNotification('Product deleted', 'success');
            loadTab(currentTab);
        }
    }
    
    function markCommissionPaid(sellerId) {
        localStorage.setItem('paid_' + sellerId, 'paid');
        showNotification('✅ Commission marked as paid', 'success');
    }
    
    function filterTable() {
        let search = document.getElementById('searchInput').value.toLowerCase();
        let roleFilter = document.getElementById('roleFilter').value;
        let statusFilter = document.getElementById('statusFilter').value;
        
        let rows = document.querySelectorAll('tbody tr');
        
        rows.forEach(row => {
            let name = row.dataset.name?.toLowerCase() || '';
            let email = row.dataset.email?.toLowerCase() || '';
            let username = row.dataset.username?.toLowerCase() || '';
            let role = row.dataset.role;
            let matchesSearch = name.includes(search) || email.includes(search) || username.includes(search);
            let matchesRole = roleFilter === 'all' || role === roleFilter;
            
            row.style.display = matchesSearch && matchesRole ? '' : 'none';
        });
    }
    
    function exportData(format) {
        let data;
        switch(currentTab) {
            case 'users': data = allUsers; break;
            case 'sellers': data = allUsers.filter(u => u.role === 'seller'); break;
            case 'products': data = allProducts; break;
            case 'orders': data = allOrders; break;
            case 'deleted': data = deletedAccounts; break;
            default: data = allUsers;
        }
        
        let content = format === 'json' ? JSON.stringify(data, null, 2) : convertToCSV(data);
        let blob = new Blob([content], { type: format === 'json' ? 'application/json' : 'text/csv' });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        a.download = `${currentTab}_${Date.now()}.${format}`;
        a.click();
    }
    
    function convertToCSV(data) {
        if (data.length === 0) return '';
        let headers = Object.keys(data[0]);
        let csv = headers.join(',') + '\n';
        data.forEach(row => {
            csv += headers.map(h => JSON.stringify(row[h] || '')).join(',') + '\n';
        });
        return csv;
    }
    
    function showBackupModal() {
        let backup = {
            users: allUsers,
            products: allProducts,
            orders: allOrders,
            deleted: deletedAccounts,
            date: new Date().toISOString()
        };
        
        let blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        a.download = `M7_backup_${Date.now()}.json`;
        a.click();
    }
    
    function logoutAdmin() {
        sessionStorage.removeItem('adminLoggedIn');
        window.location.href = 'home.html';
    }
    
    function showNotification(msg, type) {
        alert(msg); // Simple for now
    }
</script>

</body>
</html>
