<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - M7 Marketplace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="M7shooping.css">
    <link rel="icon" type="image/x-icon" href="M7shooping.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: rgba(255,255,255,0.1);
            padding: 20px 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .admin-header h1 {
            margin: 0;
            background: linear-gradient(135deg, #d96565, #4CAF50);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .admin-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 12px 25px;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .tab-btn:hover {
            background: rgba(217, 101, 101, 0.3);
            transform: translateY(-2px);
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #d96565, #b84343);
            border-color: transparent;
        }
        
        .admin-section {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: 800;
            color: #d96565;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        
        th {
            background: rgba(217, 101, 101, 0.3);
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        tr:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .action-btn {
            padding: 8px 15px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 0 5px;
        }
        
        .edit-btn { background: #4CAF50; color: white; }
        .delete-btn { background: #d96565; color: white; }
        .suspend-btn { background: #FF9800; color: white; }
        .view-btn { background: #2196F3; color: white; }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .search-bar input {
            flex: 1;
            min-width: 250px;
            padding: 15px 20px;
            border-radius: 50px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .search-bar input:focus {
            outline: 2px solid #d96565;
        }
        
        .filter-select {
            padding: 15px 25px;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .export-btn {
            background: #4CAF50;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-right: 10px;
        }
        
        .danger-btn {
            background: #d96565;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .badge {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .payment-status {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .payment-paid {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid #4CAF50;
        }

        .payment-pending {
            background: rgba(255, 152, 0, 0.2);
            color: #FF9800;
            border: 1px solid #FF9800;
        }

        .payment-summary {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .payment-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .payment-row:last-child {
            border-bottom: none;
        }
        
        .badge-active { background: rgba(76, 175, 80, 0.2); color: #4CAF50; border: 1px solid #4CAF50; }
        .badge-suspended { background: rgba(255, 152, 0, 0.2); color: #FF9800; border: 1px solid #FF9800; }
        .badge-seller { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .badge-buyer { background: rgba(33, 150, 243, 0.2); color: #2196F3; }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #d96565;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-header">
        <h1>🔐 M7 Marketplace Admin Panel</h1>
        <div>
            <span style="margin-right: 20px;">Welcome, Admin</span>
            <button onclick="logoutAdmin()" class="action-btn" style="background: #666;">Logout</button>
        </div>
    </div>
    
    <!-- Quick Stats -->
    <div class="stats-grid" id="stats-container">
        <div class="stat-card"><div class="stat-number">0</div><div>Loading...</div></div>
        <div class="stat-card"><div class="stat-number">0</div><div>Loading...</div></div>
        <div class="stat-card"><div class="stat-number">0</div><div>Loading...</div></div>
        <div class="stat-card"><div class="stat-number">0</div><div>Loading...</div></div>
    </div>
    
    <!-- Tabs -->
    <div class="admin-tabs">
        <button class="tab-btn active" onclick="switchTab('users')">👥 Users</button>
        <button class="tab-btn" onclick="switchTab('sellers')">🛒 Sellers</button>
        <button class="tab-btn" onclick="switchTab('products')">📦 Products</button>
        <button class="tab-btn" onclick="switchTab('orders')">📋 Orders</button>
        <button class="tab-btn" onclick="switchTab('payments')">💰 Payments</button>
        <button class="tab-btn" onclick="switchTab('deleted')">🗑️ Deleted</button>
    </div>
    
    <!-- Search & Filters -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Search by name, email, or username..." onkeyup="filterTable()">
        <select class="filter-select" id="roleFilter" onchange="filterTable()">
            <option value="all">All Roles</option>
            <option value="buyer">Buyers</option>
            <option value="seller">Sellers</option>
        </select>
        <select class="filter-select" id="statusFilter" onchange="filterTable()">
            <option value="all">All Status</option>
            <option value="active">Active</option>
            <option value="suspended">Suspended</option>
        </select>
    </div>
    
    <!-- Export Buttons -->
    <div style="margin-bottom: 20px; text-align: right;">
        <button onclick="exportData('csv')" class="export-btn">📥 Export CSV</button>
        <button onclick="exportData('json')" class="export-btn">📥 Export JSON</button>
        <button onclick="backupData()" class="danger-btn">💾 Backup</button>
    </div>
    
    <!-- Main Content Area -->
    <div class="admin-section" id="admin-content">
        <div style="text-align: center; padding: 50px;">
            <div class="loading-spinner"></div>
            <p>Loading admin panel...</p>
        </div>
    </div>
</div>

<script>
    // ==================== ADMIN AUTHENTICATION ====================
    const ADMIN_PASSWORD = "M7Admin2026";
    
    if (!sessionStorage.getItem('adminLoggedIn')) {
        let password = prompt("🔐 Enter Admin Password:");
        if (password !== ADMIN_PASSWORD) {
            alert("❌ Access denied!");
            window.location.href = 'home.html';
        } else {
            sessionStorage.setItem('adminLoggedIn', 'true');
        }
    }
    
    // ==================== GLOBAL VARIABLES ====================
    let currentTab = 'users';
    let allUsers = [];
    let allProducts = [];
    let allOrders = [];
    let deletedAccounts = [];
    
    // ==================== INITIALIZATION ====================
    document.addEventListener('DOMContentLoaded', function() {
        console.log('Admin panel loaded');
        loadData();
    });
    
    function loadData() {
        try {
            allUsers = JSON.parse(localStorage.getItem('users')) || [];
            allProducts = JSON.parse(localStorage.getItem('allProducts')) || [];
            allOrders = JSON.parse(localStorage.getItem('orders')) || [];
            deletedAccounts = JSON.parse(localStorage.getItem('deleted_accounts')) || [];
            
            console.log('Data loaded:', {
                users: allUsers.length,
                products: allProducts.length,
                orders: allOrders.length
            });
            
            updateStats();
            switchTab('users');
            
        } catch (error) {
            console.error('Error loading data:', error);
            document.getElementById('admin-content').innerHTML = `
                <div style="text-align: center; padding: 50px; color: #d96565;">
                    <h2>Error Loading Data</h2>
                    <p>${error.message}</p>
                </div>
            `;
        }
    }
    
    function updateStats() {
        let totalUsers = allUsers.length;
        let totalSellers = allUsers.filter(u => u.role === 'seller').length;
        let totalBuyers = allUsers.filter(u => u.role === 'buyer').length;
        let totalProducts = allProducts.length;
        let totalOrders = allOrders.length;
        let totalRevenue = allOrders.reduce((sum, o) => sum + (o.total || 0), 0);
        
        document.getElementById('stats-container').innerHTML = `
            <div class="stat-card"><div class="stat-number">${totalUsers}</div><div>Total Users</div></div>
            <div class="stat-card"><div class="stat-number">${totalSellers}</div><div>Sellers</div></div>
            <div class="stat-card"><div class="stat-number">${totalBuyers}</div><div>Buyers</div></div>
            <div class="stat-card"><div class="stat-number">${totalProducts}</div><div>Products</div></div>
            <div class="stat-card"><div class="stat-number">${totalOrders}</div><div>Orders</div></div>
            <div class="stat-card"><div class="stat-number">${totalRevenue.toLocaleString()} DZD</div><div>Revenue</div></div>
            <div class="stat-card"><div class="stat-number">${deletedAccounts.length}</div><div>Deleted</div></div>
        `;
    }
    
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        let content = document.getElementById('admin-content');
        
        switch(tab) {
            case 'users': displayUsers(content); break;
            case 'sellers': displaySellers(content); break;
            case 'products': displayProducts(content); break;
            case 'orders': displayOrders(content); break;
            case 'payments': displayPayments(content); break;
            case 'deleted': displayDeleted(content); break;
        }
    }
    
    function displayUsers(container) {
        if (allUsers.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 50px;"><h2>No Users Found</h2></div>';
            return;
        }
        
        let html = '<h2>👥 All Users</h2>';
        html += '<table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Username</th><th>Role</th><th>Joined</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
        
        allUsers.forEach(user => {
            let status = user.suspended ? 'suspended' : 'active';
            let statusClass = user.suspended ? 'badge-suspended' : 'badge-active';
            let roleClass = user.role === 'seller' ? 'badge-seller' : 'badge-buyer';
            
            html += `
                <tr data-email="${user.email || ''}" data-name="${user.fullName || ''}" data-username="${user.username || ''}" data-role="${user.role || ''}">
                    <td>${user.id || ''}</td>
                    <td>${user.fullName || ''}</td>
                    <td>${user.email || ''}</td>
                    <td>${user.username || ''}</td>
                    <td><span class="badge ${roleClass}">${user.role || 'buyer'}</span></td>
                    <td>${user.registrationDate || 'N/A'}</td>
                    <td><span class="badge ${statusClass}">${status}</span></td>
                    <td>
                        <button class="action-btn view-btn" onclick="viewUser('${user.id}')">View</button>
                        ${!user.suspended ? 
                            `<button class="action-btn suspend-btn" onclick="toggleSuspend('${user.id}')">Suspend</button>` : 
                            `<button class="action-btn edit-btn" onclick="toggleSuspend('${user.id}')">Activate</button>`}
                        <button class="action-btn delete-btn" onclick="deleteUser('${user.id}')">Delete</button>
                    </td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    function displaySellers(container) {
        let sellers = allUsers.filter(u => u.role === 'seller');
        let totalUnpaid = calculateTotalUnpaid();
        
        let html = '<h2>🛒 All Sellers</h2>';
        
        html += `
            <div style="background: rgba(255,152,0,0.1); padding: 20px; border-radius: 15px; margin-bottom: 30px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h3 style="color: #FF9800; margin: 0;">💰 Pending Payments</h3>
                        <p style="margin: 5px 0 0;">Total unpaid commissions</p>
                    </div>
                    <div style="font-size: 32px; font-weight: bold; color: #FF9800;">${totalUnpaid.toLocaleString()} DZD</div>
                </div>
            </div>
        `;
        
        if (sellers.length === 0) {
            html += '<p style="text-align: center; padding: 30px;">No sellers found</p>';
            container.innerHTML = html;
            return;
        }
        
        html += '<table><thead><tr><th>Store</th><th>Owner</th><th>Products</th><th>Revenue</th><th>Commission</th><th>Payment</th><th>Actions</th></tr></thead><tbody>';
        
        sellers.forEach(seller => {
            let products = allProducts.filter(p => p.sellerId == seller.id) || [];
            let totalRevenue = products.reduce((sum, p) => sum + ((p.sold || 0) * p.price), 0);
            let commission = Math.round(totalRevenue * 0.1);
            let hasPaid = localStorage.getItem('paid_' + seller.id) === 'paid';
            let paymentClass = hasPaid ? 'payment-paid' : 'payment-pending';
            let paymentText = hasPaid ? '✅ Paid' : '⏳ Pending';
            
            html += `
                <tr>
                    <td><strong>${seller.store?.name || 'No store'}</strong></td>
                    <td>${seller.fullName || ''}</td>
                    <td>${products.length}</td>
                    <td>${totalRevenue.toLocaleString()} DZD</td>
                    <td><strong>${commission.toLocaleString()} DZD</strong></td>
                    <td><span class="payment-status ${paymentClass}">${paymentText}</span></td>
                    <td>
                        <button class="action-btn view-btn" onclick="viewUser('${seller.id}')">View</button>
                        <button class="action-btn edit-btn" onclick="showPaymentDetails('${seller.id}')">Payment</button>
                        ${!hasPaid ? 
                            `<button class="action-btn suspend-btn" onclick="markPaymentReceived('${seller.id}')">Mark Paid</button>` : ''}
                    </td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    function displayProducts(container) {
        if (allProducts.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 50px;"><h2>No Products Found</h2></div>';
            return;
        }
        
        let html = '<h2>📦 All Products</h2>';
        html += '<table><thead><tr><th>Product</th><th>Seller</th><th>Price</th><th>Stock</th><th>Sold</th><th>Category</th><th>Actions</th></tr></thead><tbody>';
        
        allProducts.forEach(product => {
            let seller = allUsers.find(u => u.id == product.sellerId);
            
            html += `
                <tr>
                    <td>${product.name || ''}</td>
                    <td>${seller?.fullName || 'Unknown'}</td>
                    <td>${product.price?.toLocaleString() || 0} DZD</td>
                    <td>${product.quantity || 0}</td>
                    <td>${product.sold || 0}</td>
                    <td>${product.category || ''}</td>
                    <td>
                        <button class="action-btn view-btn" onclick="viewProduct('${product.id}')">View</button>
                        <button class="action-btn delete-btn" onclick="deleteProduct('${product.id}')">Delete</button>
                    </td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    function displayOrders(container) {
        if (allOrders.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 50px;"><h2>No Orders Found</h2></div>';
            return;
        }
        
        let html = '<h2>📋 All Orders</h2>';
        html += '<table><thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>';
        
        allOrders.forEach(order => {
            html += `
                <tr>
                    <td>${order.id || ''}</td>
                    <td>${order.customer?.name || 'N/A'}</td>
                    <td>${order.total?.toLocaleString() || 0} DZD</td>
                    <td><span class="badge" style="background: rgba(255,193,7,0.2); color: #ffc107;">${order.status || 'pending'}</span></td>
                    <td>${order.date || ''}</td>
                    <td><button class="action-btn view-btn" onclick="viewOrder('${order.id}')">View</button></td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    function displayPayments(container) {
        let payments = JSON.parse(localStorage.getItem('seller_payments')) || [];
        let totalCollected = payments.reduce((sum, p) => sum + p.amount, 0);
        
        let html = '<h2>💰 Payment History</h2>';
        
        html += `
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
                <div class="stat-card"><div class="stat-number">${payments.length}</div><div>Total Payments</div></div>
                <div class="stat-card"><div class="stat-number">${totalCollected.toLocaleString()} DZD</div><div>Total Collected</div></div>
                <div class="stat-card"><div class="stat-number">${calculateTotalUnpaid().toLocaleString()} DZD</div><div>Pending</div></div>
            </div>
        `;
        
        if (payments.length === 0) {
            html += '<p style="text-align: center; padding: 30px;">No payment records found</p>';
            container.innerHTML = html;
            return;
        }
        
        html += '<table><thead><tr><th>Date</th><th>Seller</th><th>Amount</th><th>Reference</th></tr></thead><tbody>';
        
        payments.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        payments.forEach(p => {
            let seller = allUsers.find(u => u.id == p.sellerId);
            html += `
                <tr>
                    <td>${p.date || ''}</td>
                    <td>${seller?.fullName || 'Unknown'}</td>
                    <td><strong>${p.amount?.toLocaleString() || 0} DZD</strong></td>
                    <td>${p.reference || 'N/A'}</td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    function displayDeleted(container) {
        if (deletedAccounts.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 50px;"><h2>No Deleted Accounts</h2></div>';
            return;
        }
        
        let html = '<h2>🗑️ Deleted Accounts</h2>';
        html += '<table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Deleted Date</th></tr></thead><tbody>';
        
        deletedAccounts.forEach(account => {
            html += `
                <tr>
                    <td>${account.fullName || ''}</td>
                    <td>${account.email || ''}</td>
                    <td>${account.role || ''}</td>
                    <td>${account.deletedDate || ''}</td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        container.innerHTML = html;
    }
    
    // ==================== ACTIONS ====================
    function toggleSuspend(userId) {
        let user = allUsers.find(u => u.id == userId);
        if (user) {
            user.suspended = !user.suspended;
            localStorage.setItem('users', JSON.stringify(allUsers));
            alert(`User ${user.suspended ? 'suspended' : 'activated'}`);
            loadData();
        }
    }
    
    function deleteUser(userId) {
        if (confirm('Delete this user permanently?')) {
            allUsers = allUsers.filter(u => u.id != userId);
            localStorage.setItem('users', JSON.stringify(allUsers));
            localStorage.removeItem('sellerProducts_' + userId);
            alert('User deleted');
            loadData();
        }
    }
    
    function deleteProduct(productId) {
        if (confirm('Delete this product?')) {
            allProducts = allProducts.filter(p => p.id != productId);
            localStorage.setItem('allProducts', JSON.stringify(allProducts));
            alert('Product deleted');
            loadData();
        }
    }
    
    function viewUser(userId) {
        let user = allUsers.find(u => u.id == userId);
        if (!user) return;
        
        let userOrders = allOrders.filter(o => o.customer?.email === user.email);
        let totalSpent = userOrders.reduce((sum, o) => sum + (o.total || 0), 0);
        
        alert(`
👤 USER DETAILS
━━━━━━━━━━━━━
Name: ${user.fullName}
Email: ${user.email}
Username: ${user.username}
Role: ${user.role}
Phone: ${user.phone || 'N/A'}
Joined: ${user.registrationDate || 'N/A'}
Orders: ${userOrders.length}
Total Spent: ${totalSpent.toLocaleString()} DZD
        `);
    }
    
    function viewSeller(sellerId) {
        viewUser(sellerId);
    }
    
    function viewProduct(productId) {
        let product = allProducts.find(p => p.id == productId);
        if (!product) return;
        
        let seller = allUsers.find(u => u.id == product.sellerId);
        
        alert(`
📦 PRODUCT DETAILS
━━━━━━━━━━━━━━━
Name: ${product.name}
Price: ${product.price.toLocaleString()} DZD
Category: ${product.category}
Condition: ${product.condition}
Stock: ${product.quantity}
Sold: ${product.sold || 0}
Seller: ${seller?.fullName || 'Unknown'}
Added: ${product.dateAdded}
Description: ${product.description}
        `);
    }
    
    function viewOrder(orderId) {
        let order = allOrders.find(o => o.id === orderId);
        if (!order) return;
        
        let itemsList = '';
        if (order.items) {
            order.items.forEach(item => {
                itemsList += `\n   • ${item.name} x${item.quantity} = ${(item.price * item.quantity).toLocaleString()} DZD`;
            });
        }
        
        alert(`
📋 ORDER DETAILS
━━━━━━━━━━━━━
Order ID: ${order.id}
Customer: ${order.customer?.name || 'N/A'}
Phone: ${order.customer?.phone || 'N/A'}
Address: ${order.customer?.address || 'N/A'}
Date: ${order.date || 'N/A'}
Status: ${order.status || 'pending'}
Payment: ${order.paymentMethod || 'N/A'}
Items:${itemsList}
━━━━━━━━━━━━━
TOTAL: ${order.total?.toLocaleString() || 0} DZD
        `);
    }
    
    function filterTable() {
        let search = document.getElementById('searchInput').value.toLowerCase();
        let roleFilter = document.getElementById('roleFilter').value;
        
        let rows = document.querySelectorAll('tbody tr');
        
        rows.forEach(row => {
            let name = row.dataset.name?.toLowerCase() || '';
            let email = row.dataset.email?.toLowerCase() || '';
            let username = row.dataset.username?.toLowerCase() || '';
            let role = row.dataset.role;
            
            let matchesSearch = name.includes(search) || email.includes(search) || username.includes(search);
            let matchesRole = roleFilter === 'all' || role === roleFilter;
            
            row.style.display = matchesSearch && matchesRole ? '' : 'none';
        });
    }
    
    function exportData(format) {
        let data;
        switch(currentTab) {
            case 'users': data = allUsers; break;
            case 'sellers': data = allUsers.filter(u => u.role === 'seller'); break;
            case 'products': data = allProducts; break;
            case 'orders': data = allOrders; break;
            default: data = allUsers;
        }
        
        let content = format === 'json' ? JSON.stringify(data, null, 2) : convertToCSV(data);
        let blob = new Blob([content], { type: format === 'json' ? 'application/json' : 'text/csv' });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        a.download = `${currentTab}_${Date.now()}.${format}`;
        a.click();
    }
    
    function convertToCSV(data) {
        if (data.length === 0) return '';
        let headers = Object.keys(data[0]);
        let csv = headers.join(',') + '\n';
        data.forEach(row => {
            csv += headers.map(h => JSON.stringify(row[h] || '')).join(',') + '\n';
        });
        return csv;
    }
    
    function backupData() {
        let backup = {
            users: allUsers,
            products: allProducts,
            orders: allOrders,
            deleted: deletedAccounts,
            date: new Date().toISOString()
        };
        
        let blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        let url = URL.createObjectURL(blob);
        let a = document.createElement('a');
        a.href = url;
        a.download = `M7_backup_${Date.now()}.json`;
        a.click();
    }
    
    function logoutAdmin() {
        sessionStorage.removeItem('adminLoggedIn');
        window.location.href = 'home.html';
    }
    
    // ==================== PAYMENT FUNCTIONS ====================
    function calculateTotalUnpaid() {
        let sellers = allUsers.filter(u => u.role === 'seller');
        let total = 0;
        
        sellers.forEach(seller => {
            if (localStorage.getItem('paid_' + seller.id) !== 'paid') {
                let products = allProducts.filter(p => p.sellerId == seller.id) || [];
                let revenue = products.reduce((sum, p) => sum + ((p.sold || 0) * p.price), 0);
                total += Math.round(revenue * 0.1);
            }
        });
        
        return total;
    }
    
    function markPaymentReceived(sellerId) {
        let seller = allUsers.find(u => u.id == sellerId);
        if (!seller) return;
        
        let products = allProducts.filter(p => p.sellerId == sellerId) || [];
        let revenue = products.reduce((sum, p) => sum + ((p.sold || 0) * p.price), 0);
        let commission = Math.round(revenue * 0.1);
        
        let paymentRecord = {
            sellerId: sellerId,
            date: new Date().toLocaleDateString(),
            amount: commission,
            reference: prompt('Enter payment reference (optional):', 'CCP Transfer') || 'CCP Transfer'
        };
        
        let payments = JSON.parse(localStorage.getItem('seller_payments')) || [];
        payments.push(paymentRecord);
        localStorage.setItem('seller_payments', JSON.stringify(payments));
        
        localStorage.setItem('paid_' + sellerId, 'paid');
        localStorage.setItem('paid_date_' + sellerId, new Date().toLocaleDateString());
        
        alert('✅ Payment marked as received!');
        loadData();
    }
    
    function showPaymentDetails(sellerId) {
        let seller = allUsers.find(u => u.id == sellerId);
        if (!seller) return;
        
        let products = allProducts.filter(p => p.sellerId == sellerId) || [];
        let revenue = products.reduce((sum, p) => sum + ((p.sold || 0) * p.price), 0);
        let commission = Math.round(revenue * 0.1);
        let hasPaid = localStorage.getItem('paid_' + sellerId) === 'paid';
        let lastPayment = localStorage.getItem('paid_date_' + sellerId) || 'Never';
        
        alert(`
💰 PAYMENT DETAILS
━━━━━━━━━━━━━━━
Seller: ${seller.store?.name || seller.fullName}
━━━━━━━━━━━━━━━
Current Commission: ${commission.toLocaleString()} DZD
Status: ${hasPaid ? '✅ PAID' : '⏳ PENDING'}
Last Payment: ${lastPayment}
━━━━━━━━━━━━━━━
🏦 CCP: 007 123 456 78901234
🔑 Key: 00 123456
📝 Reference: M7-${seller.id}
        `);
    }
