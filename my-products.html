<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Products - M7 Marketplace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="M7shooping.css">
    <link rel="icon" type="image/x-icon" href="M7shooping.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .products-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Notifications Section */
        .notifications-section {
            margin-bottom: 30px;
            animation: slideDown 0.5s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .notification-header h3 {
            color: #d96565;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .clear-notifications {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #d96565;
            color: #d96565;
            padding: 8px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        
        .clear-notifications:hover {
            background: #d96565;
            color: white;
        }
        
        .notifications-list {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .notification-item {
            background: rgba(76, 175, 80, 0.1);
            border-left: 4px solid #4CAF50;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        
        .notification-item.unread {
            background: rgba(76, 175, 80, 0.2);
            border-left-color: #d96565;
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-title {
            font-weight: 600;
            margin-bottom: 3px;
            color: #4CAF50;
        }
        
        .notification-time {
            font-size: 11px;
            opacity: 0.6;
        }
        
        .notification-badge {
            background: #d96565;
            color: white;
            padding: 3px 8px;
            border-radius: 50px;
            font-size: 11px;
            margin-left: 10px;
        }
        
        .mark-read {
            color: #4CAF50;
            cursor: pointer;
            font-size: 18px;
            margin-left: 10px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }
        
        .mark-read:hover {
            opacity: 1;
        }
        
        /* Products Header */
        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .products-header h1 {
            font-size: 42px;
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, #d96565 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .add-product-btn {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .add-product-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(76, 175, 80, 0.4);
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, #d96565 0%, #4CAF50 100%);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .stat-card:hover::before {
            transform: scaleX(1);
        }
        
        .stat-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #d96565 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }
        
        .stat-small {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 5px;
        }
        
        /* Search and Filter */
        .search-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 20px;
            border-radius: 60px;
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }
        
        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 50px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
        }
        
        .search-bar input:focus {
            outline: 2px solid #d96565;
        }
        
        .search-icon {
            font-size: 20px;
            opacity: 0.7;
        }
        
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .filter-tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 600;
        }
        
        .filter-tab:hover {
            background: rgba(217, 101, 101, 0.3);
            transform: translateY(-2px);
        }
        
        .filter-tab.active {
            background: linear-gradient(135deg, #d96565 0%, #b84343 100%);
            border-color: transparent;
        }
        
        /* Products Table */
        .table-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            overflow-x: auto;
            padding: 5px;
        }
        
        .product-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .product-table th {
            background: rgba(217, 101, 101, 0.3);
            padding: 18px 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .product-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .product-table tr:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .product-image-small {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid rgba(217, 101, 101, 0.3);
            transition: all 0.3s ease;
        }
        
        .product-image-small:hover {
            transform: scale(1.1);
            border-color: #d96565;
        }
        
        .product-name-cell {
            font-weight: 600;
            color: #d96565;
        }
        
        .stock-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .stock-high {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid #4CAF50;
        }
        
        .stock-medium {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }
        
        .stock-low {
            background: rgba(217, 101, 101, 0.2);
            color: #d96565;
            border: 1px solid #d96565;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .action-btn.edit {
            background: #4CAF50;
            color: white;
        }
        
        .action-btn.edit:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }
        
        .action-btn.duplicate {
            background: #FF9800;
            color: white;
        }
        
        .action-btn.duplicate:hover {
            background: #F57C00;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
        }
        
        .action-btn.delete {
            background: #d96565;
            color: white;
        }
        
        .action-btn.delete:hover {
            background: #b84343;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(217, 101, 101, 0.4);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            animation: fadeIn 0.6s ease-out;
        }
        
        .empty-icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .empty-state h2 {
            font-size: 32px;
            margin-bottom: 15px;
            color: #d96565;
        }
        
        .empty-state p {
            font-size: 16px;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        
        .empty-btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .empty-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(76, 175, 80, 0.4);
        }
        
        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 80px;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #d96565;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .products-header {
                flex-direction: column;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .product-table {
                font-size: 14px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .filter-tabs {
                justify-content: center;
            }
            
            .notifications-list {
                max-height: 150px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="M7shooping.png" alt="M7 Shopping Logo" class="logo-img">
        <span class="logo-text">M7 Marketplace</span>
    </div>
    <nav>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="seller-dashboard.html">Dashboard</a></li>
            <li><a href="auth.html">Account</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="products-wrapper">
        <div id="myproducts-container">
            <!-- Content loaded by JavaScript -->
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading your products...</p>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>© 2026 M7 Marketplace. All rights reserved. | <a href="about.html">About</a> | <a href="contact.html">Contact</a> | <a href="#">Terms</a> | <a href="#">Privacy</a></p>
</footer>

<script src="script.js"></script>
<script>
// Direct loader for my products page
document.addEventListener('DOMContentLoaded', function() {
    console.log('🔍 My Products page loaded');
    
    // Update navbar
    if (typeof updateNavbarForUser === 'function') {
        updateNavbarForUser();
    }
    
    // Try to use main function
    if (typeof loadMyProductsPage === 'function') {
        console.log('✅ Using loadMyProductsPage from script.js');
        loadMyProductsPage();
    } else {
        console.warn('⚠️ loadMyProductsPage not found, using direct loader');
        loadMyProductsDirect();
    }
});

// Direct loader function
function loadMyProductsDirect() {
    const container = document.getElementById('myproducts-container');
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    
    if (!currentUser || currentUser.role !== 'seller') {
        window.location.href = 'auth.html';
        return;
    }
    
    // Get seller products
    const sellerProducts = JSON.parse(localStorage.getItem('sellerProducts_' + currentUser.id)) || [];
    
    // Get notifications (orders that include this seller's products)
    const allOrders = JSON.parse(localStorage.getItem('orders')) || [];
    const sellerOrders = allOrders.filter(order => 
        order.items.some(item => item.sellerId === currentUser.id)
    );
    
    // Calculate stats
    const totalProducts = sellerProducts.length;
    const totalStock = sellerProducts.reduce((sum, p) => sum + (p.quantity || 0), 0);
    const totalSold = sellerProducts.reduce((sum, p) => sum + (p.sold || 0), 0);
    const totalRevenue = sellerProducts.reduce((sum, p) => sum + ((p.sold || 0) * p.price), 0);
    const totalOrders = sellerOrders.length;
    
    // Get recent notifications (last 5 orders)
    const recentOrders = sellerOrders.slice(-5).reverse();
    
    if (sellerProducts.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <h2>No Products Yet</h2>
                <p>Start selling by adding your first product!</p>
                <a href="seller-add-product.html" class="empty-btn">Add Your First Product</a>
            </div>
        `;
        return;
    }
    
    // Build notifications HTML
    let notificationsHTML = '';
    if (recentOrders.length > 0) {
        notificationsHTML = `
            <div class="notifications-section">
                <div class="notification-header">
                    <h3>🔔 Recent Sales (${recentOrders.length})</h3>
                    <span class="clear-notifications" onclick="markAllNotificationsRead()">Mark all as read</span>
                </div>
                <div class="notifications-list">
                    ${recentOrders.map(order => {
                        // Get only this seller's items from the order
                        const sellerItems = order.items.filter(item => item.sellerId === currentUser.id);
                        const itemNames = sellerItems.map(item => `${item.quantity}x ${item.name}`).join(', ');
                        
                        return `
                            <div class="notification-item unread">
                                <div class="notification-content">
                                    <div class="notification-title">🛒 New Order! - ${itemNames}</div>
                                    <div class="notification-time">${order.date} • Total: ${order.total.toLocaleString()} DZD</div>
                                </div>
                                <span class="notification-badge">New</span>
                                <span class="mark-read" onclick="markNotificationRead(this)">✓</span>
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `;
    }
    
    // Build main content
    let html = `
        ${notificationsHTML}
        
        <div class="products-header">
            <h1>📋 My Products</h1>
            <a href="seller-add-product.html" class="add-product-btn">➕ Add New Product</a>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-label">Total Products</div>
                <div class="stat-value">${totalProducts}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-label">In Stock</div>
                <div class="stat-value">${totalStock}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-label">Revenue</div>
                <div class="stat-value">${totalRevenue.toLocaleString()} DZD</div>
                <div class="stat-small">${totalSold} items sold</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-label">Orders</div>
                <div class="stat-value">${totalOrders}</div>
            </div>
        </div>
        
        <div class="search-bar">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchProduct" placeholder="Search products by name..." onkeyup="searchProductsDirect()">
        </div>
        
        <div class="filter-tabs">
            <span class="filter-tab active" onclick="filterProductsDirect('all')">All</span>
            <span class="filter-tab" onclick="filterProductsDirect('in-stock')">In Stock</span>
            <span class="filter-tab" onclick="filterProductsDirect('low-stock')">Low Stock (≤5)</span>
            <span class="filter-tab" onclick="filterProductsDirect('out-of-stock')">Out of Stock</span>
        </div>
        
        <div class="table-container">
            <table class="product-table">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Sold</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="products-table-body">
                    ${sellerProducts.map(p => {
                        const stockStatus = p.quantity > 10 ? 'high' : (p.quantity > 0 ? 'medium' : 'low');
                        const stockClass = p.quantity > 10 ? 'stock-high' : (p.quantity > 0 ? 'stock-medium' : 'stock-low');
                        const stockText = p.quantity > 10 ? 'In Stock' : (p.quantity > 0 ? 'Low Stock' : 'Out of Stock');
                        
                        return `
                            <tr data-stock="${p.quantity}">
                                <td><img src="${p.image}" class="product-image-small" onerror="this.src='https://via.placeholder.com/60'"></td>
                                <td class="product-name-cell">${p.name}</td>
                                <td><strong>${p.price.toLocaleString()} DZD</strong></td>
                                <td>${p.quantity}</td>
                                <td>${p.sold || 0}</td>
                                <td><span class="stock-badge ${stockClass}">${stockText}</span></td>
                                <td>
                                    <div class="action-buttons">
                                        <button onclick="editProductDirect(${p.id})" class="action-btn edit">✏️ Edit</button>
                                        <button onclick="duplicateProductDirect(${p.id})" class="action-btn duplicate">📋 Copy</button>
                                        <button onclick="deleteProductDirect(${p.id})" class="action-btn delete">🗑️</button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    }).join('')}
                </tbody>
            </table>
        </div>
    `;
    
    container.innerHTML = html;
}

// Search function
function searchProductsDirect() {
    const search = document.getElementById('searchProduct').value.toLowerCase();
    const rows = document.querySelectorAll('#products-table-body tr');
    
    rows.forEach(row => {
        const productName = row.cells[1].textContent.toLowerCase();
        row.style.display = productName.includes(search) ? '' : 'none';
    });
}

// Filter function
function filterProductsDirect(filter) {
    // Update active tab
    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.remove('active');
    });
    event.target.classList.add('active');
    
    const rows = document.querySelectorAll('#products-table-body tr');
    
    rows.forEach(row => {
        const stock = parseInt(row.dataset.stock);
        
        switch(filter) {
            case 'all':
                row.style.display = '';
                break;
            case 'in-stock':
                row.style.display = stock > 0 ? '' : 'none';
                break;
            case 'low-stock':
                row.style.display = (stock > 0 && stock <= 5) ? '' : 'none';
                break;
            case 'out-of-stock':
                row.style.display = stock === 0 ? '' : 'none';
                break;
        }
    });
}

// Edit product
function editProductDirect(productId) {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    let sellerProducts = JSON.parse(localStorage.getItem('sellerProducts_' + currentUser.id)) || [];
    const productIndex = sellerProducts.findIndex(p => p.id === productId);
    
    if (productIndex === -1) return;
    
    const product = sellerProducts[productIndex];
    
    const newName = prompt('Edit product name:', product.name);
    if (newName) product.name = newName;
    
    const newPrice = prompt('Edit price (DZD):', product.price);
    if (newPrice && !isNaN(newPrice) && newPrice > 0) product.price = parseInt(newPrice);
    
    const newQuantity = prompt('Edit quantity:', product.quantity);
    if (newQuantity && !isNaN(newQuantity) && newQuantity >= 0) product.quantity = parseInt(newQuantity);
    
    // Save changes
    localStorage.setItem('sellerProducts_' + currentUser.id, JSON.stringify(sellerProducts));
    
    // Update in all products
    let allProducts = JSON.parse(localStorage.getItem('allProducts')) || [];
    const allIndex = allProducts.findIndex(p => p.id === productId);
    if (allIndex !== -1) {
        allProducts[allIndex] = product;
        localStorage.setItem('allProducts', JSON.stringify(allProducts));
    }
    
    showNotificationDirect('✅ Product updated!', 'success');
    loadMyProductsDirect();
}

// Duplicate product
function duplicateProductDirect(productId) {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    let sellerProducts = JSON.parse(localStorage.getItem('sellerProducts_' + currentUser.id)) || [];
    const original = sellerProducts.find(p => p.id === productId);
    
    if (!original) return;
    
    const duplicate = {
        ...original,
        id: Date.now(),
        name: original.name + ' (Copy)',
        dateAdded: new Date().toLocaleString(),
        sold: 0
    };
    
    sellerProducts.push(duplicate);
    localStorage.setItem('sellerProducts_' + currentUser.id, JSON.stringify(sellerProducts));
    
    let allProducts = JSON.parse(localStorage.getItem('allProducts')) || [];
    allProducts.push(duplicate);
    localStorage.setItem('allProducts', JSON.stringify(allProducts));
    
    showNotificationDirect('✅ Product duplicated!', 'success');
    loadMyProductsDirect();
}

// Delete product
function deleteProductDirect(productId) {
    if (!confirm('Are you sure you want to delete this product?')) return;
    
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    
    // Remove from seller products
    let sellerProducts = JSON.parse(localStorage.getItem('sellerProducts_' + currentUser.id)) || [];
    sellerProducts = sellerProducts.filter(p => p.id !== productId);
    localStorage.setItem('sellerProducts_' + currentUser.id, JSON.stringify(sellerProducts));
    
    // Remove from all products
    let allProducts = JSON.parse(localStorage.getItem('allProducts')) || [];
    allProducts = allProducts.filter(p => p.id !== productId);
    localStorage.setItem('allProducts', JSON.stringify(allProducts));
    
    showNotificationDirect('🗑️ Product deleted', 'info');
    loadMyProductsDirect();
}

// Notification functions
function markNotificationRead(element) {
    const notification = element.closest('.notification-item');
    notification.classList.remove('unread');
    element.style.display = 'none';
}

function markAllNotificationsRead() {
    document.querySelectorAll('.notification-item').forEach(item => {
        item.classList.remove('unread');
        const markRead = item.querySelector('.mark-read');
        if (markRead) markRead.style.display = 'none';
    });
}

// Show notification
function showNotificationDirect(message, type) {
    const notification = document.createElement('div');
    notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        padding: 15px 25px;
        border-radius: 50px;
        background: ${type === 'success' ? '#4CAF50' : type === 'error' ? '#d96565' : '#2196F3'};
        color: white;
        font-weight: 600;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        animation: slideIn 0.3s ease;
    `;
    notification.textContent = message;
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => notification.remove(), 300);
    }, 3000);
}

// Add animation styles
const style = document.createElement('style');
style.textContent = `
    @keyframes slideIn {
        from { transform: translateX(100px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOut {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(100px); opacity: 0; }
    }
`;
document.head.appendChild(style);
</script>
