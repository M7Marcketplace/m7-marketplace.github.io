<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Orders - M7 Marketplace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="M7shooping.css">
    <link rel="icon" type="image/x-icon" href="M7shooping.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .orders-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .page-header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, #d96565 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .page-header p {
            font-size: 16px;
            opacity: 0.8;
        }
        
        /* Role Indicator */
        .role-indicator {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .role-indicator.buyer {
            color: #2196F3;
            border-color: #2196F3;
        }
        
        .role-indicator.seller {
            color: #4CAF50;
            border-color: #4CAF50;
        }
        
        /* Stat Cards */
        .stat-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .stat-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #d96565 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-small {
            font-size: 13px;
            opacity: 0.7;
            margin-top: 5px;
        }
        
        /* Filter Section */
        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .filter-btn {
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 600;
        }
        
        .filter-btn:hover {
            background: rgba(217, 101, 101, 0.3);
            transform: translateY(-2px);
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, #d96565 0%, #b84343 100%);
            border-color: transparent;
        }
        
        /* Orders List */
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .order-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 25px;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .order-card:hover {
            transform: translateX(10px) translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .order-id {
            font-size: 18px;
            font-weight: 700;
            color: #d96565;
            background: rgba(217, 101, 101, 0.1);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid #d96565;
        }
        
        .order-date {
            opacity: 0.7;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .order-status {
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }
        
        .status-processing {
            background: rgba(0, 123, 255, 0.2);
            color: #007bff;
            border: 1px solid #007bff;
        }
        
        .status-shipped {
            background: rgba(23, 162, 184, 0.2);
            color: #17a2b8;
            border: 1px solid #17a2b8;
        }
        
        .status-delivered {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }
        
        .status-cancelled {
            background: rgba(217, 101, 101, 0.2);
            color: #d96565;
            border: 1px solid #d96565;
        }
        
        /* Customer Info */
        .customer-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .customer-info-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .customer-info-icon {
            font-size: 20px;
            width: 35px;
            height: 35px;
            background: rgba(217, 101, 101, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .customer-info-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 2px;
        }
        
        .customer-info-value {
            font-weight: 600;
        }
        
        /* Order Items */
        .order-items {
            margin: 20px 0;
        }
        
        .order-items-title {
            font-size: 16px;
            font-weight: 600;
            color: #d96565;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .order-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        
        .order-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }
        
        .order-item-image {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid rgba(217, 101, 101, 0.3);
        }
        
        .order-item-details {
            flex: 1;
        }
        
        .order-item-name {
            font-weight: 600;
            color: #d96565;
            margin-bottom: 5px;
        }
        
        .order-item-meta {
            font-size: 13px;
            opacity: 0.7;
            display: flex;
            gap: 15px;
        }
        
        .order-item-price {
            font-weight: 600;
            color: #4CAF50;
            font-size: 16px;
        }
        
        /* Order Footer */
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .order-total {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #4CAF50 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .order-total span {
            font-size: 14px;
            opacity: 0.7;
            margin-right: 10px;
        }
        
        .status-select {
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .status-select:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .status-select:focus {
            outline: 2px solid #d96565;
        }
        
        .status-select option {
            background: #333;
            color: white;
        }
        
        /* Empty State */
        .empty-orders {
            text-align: center;
            padding: 80px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 500px;
            margin: 40px auto;
        }
        
        .empty-orders-icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .empty-orders h2 {
            font-size: 32px;
            margin-bottom: 15px;
            color: #d96565;
        }
        
        .empty-orders p {
            font-size: 16px;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        
        .shop-now-btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .shop-now-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(76, 175, 80, 0.4);
        }
        
        /* Loading State */
        .loading-state {
            text-align: center;
            padding: 80px;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #d96565;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .stat-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .order-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .customer-info {
                grid-template-columns: 1fr;
            }
            
            .order-footer {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .order-total {
                align-self: flex-start;
            }
            
            .stat-cards {
                grid-template-columns: 1fr;
            }
            
            .filter-section {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="M7shooping.png" alt="M7 Shopping" class="logo-img">
        <span class="logo-text">M7 Marketplace</span>
    </div>
    <nav>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="seller-dashboard.html">Dashboard</a></li>
            <li><a href="auth.html">Account</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="orders-wrapper">
        <div id="orders-container">
            <!-- Orders will be loaded here by JavaScript -->
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading your orders...</p>
            </div>
        </div>
    </div>
</main>

<footer>
    <p>© 2026 M7 Marketplace. All rights reserved. | <a href="about.html">About</a> | <a href="contact.html">Contact</a> | <a href="#">Terms</a> | <a href="#">Privacy</a></p>
</footer>

<script src="script.js"></script>
<script>
// Direct orders loader
document.addEventListener('DOMContentLoaded', function() {
    console.log('🔍 Orders page loaded');
    
    // Update navbar
    if (typeof updateNavbarForUser === 'function') {
        updateNavbarForUser();
    }
    
    // Load orders
    setTimeout(loadOrdersDirect, 500);
});

function loadOrdersDirect() {
    const container = document.getElementById('orders-container');
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    
    if (!currentUser) {
        container.innerHTML = `
            <div class="empty-orders">
                <div class="empty-orders-icon">🔒</div>
                <h2>Please Login</h2>
                <p>You need to login to view your orders.</p>
                <a href="login.html" class="shop-now-btn">Login</a>
            </div>
        `;
        return;
    }
    
    // Get all orders
    const allOrders = JSON.parse(localStorage.getItem('orders')) || [];
    
    // Filter orders based on user role
    let userOrders;
    let roleText;
    let roleClass;
    
    if (currentUser.role === 'seller') {
        // Sellers see orders that contain their products
        userOrders = allOrders.filter(order => 
            order.items.some(item => item.sellerId === currentUser.id)
        );
        roleText = 'Seller View';
        roleClass = 'seller';
    } else {
        // Buyers see orders they placed
        userOrders = allOrders.filter(order => 
            order.customer && order.customer.email === currentUser.email
        );
        roleText = 'Buyer View';
        roleClass = 'buyer';
    }
    
    // Calculate statistics
    const totalOrders = userOrders.length;
    const totalSpent = userOrders.reduce((sum, order) => sum + (order.total || 0), 0);
    const totalItems = userOrders.reduce((sum, order) => {
        return sum + order.items.reduce((itemSum, item) => itemSum + item.quantity, 0);
    }, 0);
    const pendingOrders = userOrders.filter(o => o.status === 'pending').length;
    
    if (userOrders.length === 0) {
        container.innerHTML = `
            <div class="empty-orders">
                <div class="empty-orders-icon">📦</div>
                <h2>No Orders Yet</h2>
                <p>${currentUser.role === 'seller' ? 
                    'When customers buy your products, they will appear here.' : 
                    'Start shopping to place your first order!'}</p>
                <a href="${currentUser.role === 'seller' ? 'seller-add-product.html' : 'products.html'}" class="shop-now-btn">
                    ${currentUser.role === 'seller' ? 'Add Products' : 'Start Shopping'}
                </a>
            </div>
        `;
        return;
    }
    
    // Statistics HTML
    let statsHTML = `
        <div class="stat-cards">
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-label">Total Orders</div>
                <div class="stat-value">${totalOrders}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-label">Total ${currentUser.role === 'seller' ? 'Revenue' : 'Spent'}</div>
                <div class="stat-value">${totalSpent.toLocaleString()} DZD</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-label">Items Purchased</div>
                <div class="stat-value">${totalItems}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏳</div>
                <div class="stat-label">Pending</div>
                <div class="stat-value">${pendingOrders}</div>
                <div class="stat-small">awaiting processing</div>
            </div>
        </div>
    `;
    
    // Filter buttons
    let filterHTML = `
        <div class="filter-section">
            <span class="filter-btn active" onclick="filterOrdersDirect('all')">All Orders</span>
            <span class="filter-btn" onclick="filterOrdersDirect('pending')">Pending</span>
            <span class="filter-btn" onclick="filterOrdersDirect('processing')">Processing</span>
            <span class="filter-btn" onclick="filterOrdersDirect('shipped')">Shipped</span>
            <span class="filter-btn" onclick="filterOrdersDirect('delivered')">Delivered</span>
        </div>
    `;
    
    // Orders HTML
    let ordersHTML = '<div class="orders-list" id="orders-list">';
    
    // Sort orders by date (newest first)
    userOrders.sort((a, b) => new Date(b.date) - new Date(a.date));
    
    userOrders.forEach(order => {
        const status = order.status || 'pending';
        const statusClass = `status-${status}`;
        
        // For sellers, show only their items
        const itemsToShow = currentUser.role === 'seller' 
            ? order.items.filter(item => item.sellerId === currentUser.id)
            : order.items;
        
        const orderTotal = currentUser.role === 'seller'
            ? itemsToShow.reduce((sum, item) => sum + (item.price * item.quantity), 0)
            : order.total || itemsToShow.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        
        ordersHTML += `
            <div class="order-card" data-status="${status}">
                <div class="order-header">
                    <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                        <span class="order-id">${order.id}</span>
                        <span class="order-date">📅 ${order.date}</span>
                    </div>
                    <span class="order-status ${statusClass}">${status.toUpperCase()}</span>
                </div>
                
                ${currentUser.role === 'seller' ? `
                    <div class="customer-info">
                        <div class="customer-info-item">
                            <span class="customer-info-icon">👤</span>
                            <div>
                                <div class="customer-info-label">Customer</div>
                                <div class="customer-info-value">${order.customer?.name || 'N/A'}</div>
                            </div>
                        </div>
                        <div class="customer-info-item">
                            <span class="customer-info-icon">📞</span>
                            <div>
                                <div class="customer-info-label">Phone</div>
                                <div class="customer-info-value">${order.customer?.phone || 'N/A'}</div>
                            </div>
                        </div>
                        <div class="customer-info-item">
                            <span class="customer-info-icon">📍</span>
                            <div>
                                <div class="customer-info-label">Address</div>
                                <div class="customer-info-value">${order.customer?.address || 'N/A'}</div>
                            </div>
                        </div>
                    </div>
                ` : ''}
                
                <div class="order-items">
                    <div class="order-items-title">
                        <span>📋 Items ${currentUser.role === 'seller' ? '(Your Products)' : ''}</span>
                    </div>
                    ${itemsToShow.map(item => `
                        <div class="order-item">
                            <img src="${item.image}" class="order-item-image" onerror="this.src='https://via.placeholder.com/70'">
                            <div class="order-item-details">
                                <div class="order-item-name">${item.name}</div>
                                <div class="order-item-meta">
                                    <span>Quantity: ${item.quantity}</span>
                                    <span>Price: ${item.price.toLocaleString()} DZD</span>
                                </div>
                            </div>
                            <div class="order-item-price">${(item.price * item.quantity).toLocaleString()} DZD</div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="order-footer">
                    <div class="order-total">
                        <span>Total:</span> ${orderTotal.toLocaleString()} DZD
                    </div>
                    
                    ${currentUser.role === 'seller' ? `
                        <select class="status-select" onchange="updateOrderStatusDirect('${order.id}', this.value)">
                            <option value="pending" ${status === 'pending' ? 'selected' : ''}>⏳ Pending</option>
                            <option value="processing" ${status === 'processing' ? 'selected' : ''}>🔄 Processing</option>
                            <option value="shipped" ${status === 'shipped' ? 'selected' : ''}>🚚 Shipped</option>
                            <option value="delivered" ${status === 'delivered' ? 'selected' : ''}>✅ Delivered</option>
                        </select>
                    ` : `
                        <div class="payment-method">
                            💳 Payment: ${order.paymentMethod || 'CCP'}
                        </div>
                    `}
                </div>
            </div>
        `;
    });
    
    ordersHTML += '</div>';
    
    container.innerHTML = `
        <div class="page-header">
            <h1>📋 My Orders</h1>
            <span class="role-indicator ${roleClass}">${roleText}</span>
        </div>
        ${statsHTML}
        ${filterHTML}
        ${ordersHTML}
    `;
}

// Filter orders by status
function filterOrdersDirect(status) {
    // Update active filter button
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    event.target.classList.add('active');
    
    // Filter orders
    const orders = document.querySelectorAll('.order-card');
    orders.forEach(order => {
        if (status === 'all') {
            order.style.display = 'block';
        } else {
            order.style.display = order.dataset.status === status ? 'block' : 'none';
        }
    });
}

// Update order status (for sellers)
function updateOrderStatusDirect(orderId, newStatus) {
    const allOrders = JSON.parse(localStorage.getItem('orders')) || [];
    const orderIndex = allOrders.findIndex(o => o.id === orderId);
    
    if (orderIndex !== -1) {
        allOrders[orderIndex].status = newStatus;
        localStorage.setItem('orders', JSON.stringify(allOrders));
        
        // Show success message
        showNotificationDirect(`✅ Order status updated to ${newStatus}`, 'success');
        
        // Update the status badge
        const orderCard = event.target.closest('.order-card');
        const statusBadge = orderCard.querySelector('.order-status');
        statusBadge.className = `order-status status-${newStatus}`;
        statusBadge.textContent = newStatus.toUpperCase();
        orderCard.dataset.status = newStatus;
    }
}

// Show notification
function showNotificationDirect(message, type) {
    const notification = document.createElement('div');
    notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        padding: 15px 25px;
        border-radius: 50px;
        background: ${type === 'success' ? '#4CAF50' : type === 'error' ? '#d96565' : '#2196F3'};
        color: white;
        font-weight: 600;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
